spring.application.name=MySawit-Pengiriman-Test
server.port=0
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

grpc.server.port=-1
grpc.client.user-service.address=static://localhost:9091
grpc.client.user-service.negotiationType=PLAINTEXT
grpc.client.harvest-service.address=static://localhost:9092
grpc.client.harvest-service.negotiationType=PLAINTEXT
grpc.client.payment-service.address=static://localhost:9093
grpc.client.payment-service.negotiationType=PLAINTEXT
