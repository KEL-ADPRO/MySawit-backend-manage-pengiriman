name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Grant execute permission
        run: chmod +x ./gradlew
      - name: Run Checkstyle
        run: ./gradlew checkstyleMain checkstyleTest

  unit-test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Grant execute permission
        run: chmod +x ./gradlew
      - name: Run unit tests
        run: ./gradlew test jacocoTestReport

  functional-test:
    runs-on: ubuntu-latest
    needs: unit-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Grant execute permission
        run: chmod +x ./gradlew
      - name: Run functional tests
        run: ./gradlew functionalTest

  build:
    runs-on: ubuntu-latest
    needs: functional-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle
      - name: Grant execute permission
        run: chmod +x ./gradlew
      - name: Build application
        run: ./gradlew assemble
